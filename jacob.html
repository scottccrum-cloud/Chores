<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Jacob's Chores">
  <title>Jacob's Chore Chart</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800&display=swap" rel="stylesheet">
  <style>
    /* --- Global Styles & Theme Variables --- */
    :root {
      --font: 'Satoshi', -apple-system, sans-serif;
      --bg: #121824;         /* Deep space dark background */
      --sur: #1e2640;        /* Card backgrounds */
      --sur2: #171e30;       /* Inside item backgrounds */
      --brd: #2d3748;        /* Clean borders */
      --div: rgba(255, 255, 255, 0.08);
      --tx: #f3f4f6;         /* Crisp off-white text */
      --txm: #9ca3af;        /* Soft gray secondary text */
      
      /* Vibrant Neon Accents */
      --pri: #10b981;        /* Jacob's custom theme: Neon Green for daily chores */
      --sph: #3b82f6;        /* Tech blue for specialty */
      --wkh: #a855f7;        /* Purple for weekly */
      --dbh: #f59e0b;        /* Amber for DoorDash/Uber */
      --red: #ef4444;        /* Bright red for penalties */
      --pur: #ec4899;        /* Pink/Purple for rewards */
      --mon: #06b6d4;        /* Cyan for monetary rewards */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tx);
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* --- Setup Modal Overlay --- */
    .modal-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--sur);
      border: 2px solid var(--brd);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .modal h2 { color: var(--pri); margin-bottom: 10px; font-weight: 800; }
    .modal p { color: var(--txm); margin-bottom: 20px; font-size: 0.95rem; }
    .modal label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: var(--txm); }
    .modal input { width: 100%; padding: 12px; background: var(--sur2); border: 1px solid var(--brd); color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
    .modal input:focus { border-color: var(--pri); }
    .btn-primary { width: 100%; padding: 14px; background: var(--pri); border: none; color: #121824; font-weight: 800; text-transform: uppercase; border-radius: 10px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }

    /* --- Header --- */
    .hdr {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--sur);
      border-bottom: 1px solid var(--brd);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hdr-title {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(45deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .hdr-sub { font-size: 0.8rem; color: var(--txm); font-weight: 700; margin-top: 2px; }
    .hdr-r { display: flex; align-items: center; gap: 15px; }
    .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--txm); }
    .sync-dot.online { background: var(--pri); box-shadow: 0 0 8px var(--pri); }
    .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--tx); }

    /* --- Day Selector Strip --- */
    .week-row { display: none; }
    .day-strip {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      overflow-x: auto;
      max-width: 650px;
      margin: 0 auto;
    }
    .daychip {
      flex: 1;
      min-width: 52px;
      padding: 12px 6px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 800;
      background: var(--sur2);
      border: 2px solid var(--brd);
      color: var(--txm);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .daychip.sel {
      background: var(--pri);
      border-color: var(--pri);
      color: #121824;
      transform: scale(1.05);
    }

    /* --- Content Sections & Cards --- */
    .content { padding: 0 20px; display: flex; flex-direction: column; gap: 20px; max-width: 650px; margin: 0 auto; }
    .sec {
      background: var(--sur);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--brd);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .sec-hdr {
      padding: 14px 20px;
      font-weight: 800;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--brd);
    }
    .sec-hdr span { font-size: 0.75rem; opacity: 0.7; }

    /* Apply colors to section headings */
    .s-daily .sec-hdr { color: var(--pri); }
    .s-spec .sec-hdr { color: var(--sph); }
    .s-week .sec-hdr { color: var(--wkh); }
    .s-dash .sec-hdr { color: var(--dbh); }
    .s-pen .sec-hdr { color: var(--red); }
    .s-rew .sec-hdr { color: var(--pur); }
    .s-mon .sec-hdr { color: var(--mon); }

    .c
