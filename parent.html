<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family Chore Hub</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121824;         /* Deep space dark background */
      --sur: #1e2640;        /* Card background */
      --brd: #2d3748;        /* Clean borders */
      --tx: #f3f4f6;         /* Crisp off-white text */
      --txm: #9ca3af;        /* Soft gray secondary text */
      
      /* Profile Highlight Colors */
      --ethan-color: #3b82f6; /* Tech Blue */
      --jacob-color: #10b981; /* Neon Green */
      --mia-color: #ec4899;   /* Bright Pink/Purple */
      --parent-color: #a855f7;/* Royal Purple */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Satoshi', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--tx);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* --- Hub Layout --- */
    .hub-container {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    .title-screen {
      margin-bottom: 40px;
    }

    .title-screen h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(45deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .title-screen p {
      color: var(--txm);
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* --- Character Selection Grid --- */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    /* --- Character Cards --- */
    .char-card {
      background: var(--sur);
      border: 2px solid var(--brd);
      border-radius: 20px;
      padding: 30px 20px;
      text-decoration: none;
      color: var(--tx);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    /* Avatar Styling */
    .avatar {
      font-size: 3.5rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      transition: transform 0.2s ease;
    }

    .char-name {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .char-role {
      font-size: 0.8rem;
      color: var(--txm);
      text-transform: uppercase;
      font-weight: 700;
      background: rgba(255,255,255,0.05);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* --- Hover & Selection FX --- */
    .char-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .char-card:hover .avatar {
      transform: scale(1.15) rotate(4deg);
    }

    /* Custom Theme Glows per Character */
    .char-ethan:hover { border-color: var(--ethan-color); box-shadow: 0 0 20px rgba(59, 130, 246, 0.25); }
    .char-ethan .char-name { color: #fff; }
    .char-ethan:hover .char-name { color: var(--ethan-color); }

    .char-jacob:hover { border-color: var(--jacob-color); box-shadow: 0 0 20px rgba(16, 185, 129, 0.25); }
    .char-jacob .char-name { color: #fff; }
    .char-jacob:hover .char-name { color: var(--jacob-color); }

    .char-mia:hover { border-color: var(--mia-color); box-shadow: 0 0 20px rgba(236, 72, 153, 0.25); }
    .char-mia .char-name { color: #fff; }
    .char-mia:hover .char-name { color: var(--mia-color); }

    .char-parent:hover { border-color: var(--parent-color); box-shadow: 0 0 20px rgba(168, 85, 247, 0.25); }
    .char-parent .char-name { color: #fff; }
    .char-parent:hover .char-name { color: var(--parent-color); }

    /* Footer Meta */
    .footer-note {
      font-size: 0.8rem;
      color: var(--txm);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="hub-container">
    
    <div class="title-screen">
      <h1>Chore Dashboard</h1>
      <p>Select Your Character to Begin</p>
    </div>

    <div class="char-grid">
      
      <a href="ethan.html" class="char-card char-ethan">
        <div class="avatar">👦🏻</div>
        <div class="char-name">Ethan</div>
        <div class="char-role">Player 1</div>
      </a>

      <a href="jacob.html" class="char-card char-jacob">
        <div class="avatar">👦🏼</div>
        <div class="char-name">Jacob</div>
        <div class="char-role">Player 2</div>
      </a>

      <a href="mia.html" class="char-card char-mia">
        <div class="avatar">👧🏻</div>
        <div class="char-name">Mia</div>
        <div class="char-role">Player 3</div>
      </a>

      <a href="parent.html" class="char-card char-parent">
        <div class="avatar">👑</div>
        <div class="char-name">Parents</div>
        <div class="char-role">Admin Control</div>
      </a>

    </div>

    <div class="footer-note">
      Family Sync Engine Active v2.0
    </div>

  </div>

</body>
