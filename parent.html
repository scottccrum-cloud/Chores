<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parent Control Dashboard</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Satoshi', -apple-system, sans-serif;
      --bg: #0f141c;
      --sur: #1a2035;
      --sur2: #121726;
      --brd: #2d3748;
      --div: rgba(255, 255, 255, 0.08);
      --tx: #f3f4f6;
      --txm: #9ca3af;
      
      /* Kid Colors */
      --ethan: #3b82f6; /* Tech Blue */
      --jacob: #10b981; /* Neon Green */
      --mia: #ec4899;   /* Neon Pink */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tx);
      min-height: 100dvh;
      padding-bottom: 40px;
    }

    .hdr {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--sur);
      border-bottom: 1px solid var(--brd);
      padding: 20px;
    }
    .hdr-title {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(45deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .hdr-sub { font-size: 0.85rem; color: var(--txm); }

    .day-strip {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      overflow-x: auto;
    }
    .daychip {
      flex: 1;
      min-width: 50px;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      background: var(--sur2);
      border: 2px solid var(--brd);
      color: var(--txm);
      transition: all 0.2s ease;
    }
    .daychip.sel {
      background: #a855f7;
      border-color: #a855f7;
      color: #fff;
      transform: scale(1.05);
    }

    .content { padding: 0 20px; display: flex; flex-direction: column; gap: 25px; }
    
    .kid-section {
      background: var(--sur);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--brd);
    }
    
    .kid-hdr {
      padding: 15px 20px;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      border-bottom: 1px solid var(--brd);
      background: rgba(255,255,255,0.02);
    }
    
    .k-ethan .kid-hdr { color: var(--ethan); border-left: 5px solid var(--ethan); }
    .k-jacob .kid-hdr { color: var(--jacob); border-left: 5px solid var(--jacob); }
    .k-mia .kid-hdr { color: var(--mia); border-left: 5px solid var(--mia); }

    .citem {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid var(--div);
    }
    .citem:last-child { border-bottom: none; }
    .cinfo { flex: 1; }
    .cname { font-size: 1rem; font-weight: 500; }
    
    /* Indicator Lights */
    .status-light {
      width: 45px;
      padding: 6px 0;
      text-align: center;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background: #242b3d;
      color: var(--txm);
      transition: all 0.2s ease;
    }
    
    .k-ethan .status-light.active { background: var(--ethan); color: #fff; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
    .k-jacob .status-light.active { background: var(--jacob); color: #fff; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
    .k-mia .status-light.active { background: var(--mia); color: #fff; box-shadow: 0 0 10px rgba(236, 72, 153, 0.4); }
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-title">Parent Command Center</div>
    <div class="hdr-sub">Real-Time Chore Monitor</div>
  </div>

  <div class="day-strip">
    <button class="daychip sel">Mon</button>
    <button class="daychip">Tue</button>
    <button class="daychip">Wed</button>
    <button class="daychip">Thu</button>
    <button class="daychip">Fri</button>
    <button class="daychip">Sat</button>
    <button class="daychip">Sun</button>
  </div>

  <div class="content">

    <div class="kid-section k-ethan">
      <div class="kid-hdr">Ethan</div>
      <div class="citem">
        <div class="cinfo"><div class="cname">Wipe down kitchen counters</div></div>
        <div class="status-light" id="ethan_0">Open</div>
      </div>
    </div>

    <div class="kid-section k-jacob">
      <div class="kid-hdr">Jacob</div>
      <div class="citem">
        <div class="cinfo"><div class="cname">Feed the pets & fresh water</div></div>
        <div class="status-light" id="jacob_0">Open</div>
      </div>
      <div class="citem">
        <div class="cinfo"><div class="cname">Trash cans out to the curb</div></div>
        <div class="status-light" id="jacob_1">Open</div>
      </div>
    </div>

    <div class="kid-section k-mia">
      <div class="kid-hdr">Mia</div>
      <div class="citem">
        <div class="cinfo"><div class="cname">Empty the dishwasher</div></div>
        <div class="status-light" id="mia_0">Open</div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1tuzNLZOcirHiWIORiD0lyvCnWQbdJMM",
      authDomain: "chore-chart-2026.firebaseapp.com",
      databaseURL: "https://chore-chart-2026-default-rtdb.firebaseio.com/",
      projectId: "chore-chart-2026",
      storageBucket: "chore-chart-2026.firebasestorage.app",
      messagingSenderId: "648704780405",
      appId: "1:648704780405:web:246dc2cf5301085469b03c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const dayChips = document.querySelectorAll('.daychip');
    let currentDay = "Mon";

    // Day toggle switcher
    dayChips.forEach(chip => {
      chip.addEventListener('click', () => {
        dayChips.forEach(c => c.classList.remove('sel'));
        chip.classList.add('sel');
        currentDay = chip.textContent;
        syncParentDashboard(currentDay);
      });
    });

    // Main multi-listener to download all kid statuses simultaneously
    function syncParentDashboard(day) {
      // 1. Listen to Ethan
      onValue(ref(db, `ethan/days/${day}`), (snapshot) => {
        const data = snapshot.val() || {};
        updateLight("ethan_0", data.chore_0);
      });

      // 2. Listen to Jacob
      onValue(ref(db, `jacob/days/${day}`), (snapshot) => {
        const data = snapshot.val() || {};
        updateLight("jacob_0", data.chore_0);
        updateLight("jacob_1", data.chore_1);
      });

      // 3. Listen to Mia
      onValue(ref(db, `mia/days/${day}`), (snapshot) => {
        const data = snapshot.val() || {};
        updateLight("mia_0", data.chore_0);
      });
    }

    // Dynamic label/color flipper helper
    function updateLight(elementId, isDone) {
      const el = document.getElementById(elementId);
      if(!el) return;
      
      if (isDone === true) {
        el.textContent = "Done";
        el.classList.add('active');
      } else {
        el.textContent = "Open";
        el.classList.remove('active');
      }
    }

    // Initialize display on load
    syncParentDashboard(currentDay);
  </script>

</body>
</html>
